<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory & Image Reveal Game</title>
  <style>
    /* --- CSS SECTION --- */
    body {
      font-family: sans-serif;
      margin: 0;
      min-height: 100vh;
      /* The White-Green-White Gradient Background */
      background: linear-gradient(to bottom left, #ffffff, #8fdda8, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .hidden {
      display: none !important;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #34495e;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    /* UI and Button */
    #game-ui {
      text-align: center;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
    }

    #refresh-btn {
      background-color: #2c3e50;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      position: relative;
      z-index: 100;
    }

    #refresh-btn:hover {
      background-color: #1a252f;
    }

    /* Game Board Grid */
    #game-board {
      display: grid;
      gap: 15px;
      margin: 0 auto; 
    }

    /* 3D Card Mechanics */
    .card-slot {
      width: 120px;
      height: 120px;
      perspective: 1000px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    /* Front (Gray Question Mark Box) */
    .card-front {
      width: 100%;
      height: 100%;
      position: absolute;
      backface-visibility: hidden;
      border-radius: 12px;
      background-color: #bdc3c7; 
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Blue_question_mark_icon.svg/120px-Blue_question_mark_icon.svg.png');
      background-size: 40%;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* Back of the card */
    .card-back {
      width: 100%;
      height: 100%;
      position: absolute;
      backface-visibility: hidden;
      border-radius: 12px;
      transform: rotateY(180deg);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    /* BOTTOM LAYER: The masked fraction of the background image */
    .image-layer {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      border-radius: 12px;
      background-repeat: no-repeat;
      z-index: 1;
    }

    /* TOP LAYER: The Image/Text and the Gray/Green background */
    .content-layer {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      background-color: #bdc3c7; /* Gray */
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #2c3e50;
      font-weight: bold;
      font-size: 14px;
      transition: opacity 0.5s ease, background-color 0.3s ease;
      z-index: 2; /* Sits on top of the image layer */
    }

    .content-layer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* When matched, turn green */
    .content-layer.matched {
      background-color: #4CAF50; /* Green */
      color: white;
    }

    /* Final Fullscreen Image Overlay */
    #final-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(255, 255, 255, 0.85);
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      z-index: 50; 
      opacity: 0;
      transition: opacity 1s ease-in-out;
      pointer-events: none; 
    }

    #final-overlay.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- HTML Elements -->
  <div id="loading-screen">
    <h1>Loading Game Assets...</h1>
    <p id="loading-text">0 loaded</p>
  </div>

  <div id="final-overlay" class="hidden"></div>

  <div id="game-ui" class="hidden">
    <button id="refresh-btn">Reset Game</button>
    <div id="game-board"></div>
  </div>

  <script>
    /* --- JAVASCRIPT SECTION --- */
    
    // --- SETTINGS ---
    const TARGET_IMAGE = 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779335581/download_f4ctpx.jpg';
    const GREEN_FADE_DELAY = 1000; // 1000ms = 1 second fade delay after a match
    
    // Memory Game Data (You can add as many as you want here!)
    const gameData = [
      { id: 1, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156487/manglockhithai_v2mghc.jpg', text: 'Màng lọc khí thải' },
      { id: 2, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156481/xilocao_gawgmm.jpg', text: 'Xỉ lò cao' },
      { id: 3, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156480/voitoi_v9vkqo.jpg', text: 'Vôi tôi' },
      { id: 4, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156480/thachcao_xteav4.jpg', text: 'Thạch cao' },
      { id: 5, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156472/trotrau_jtmmfn.jpg', text: 'Tro trấu' },
      { id: 6, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156487/trobay_gamos9.jpg', text: 'Tro bay' },
      { id: 7, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156472/camket_gezdnv.jpg', text: 'Cam kết' },
      { id: 8, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156472/clanke_vtwagl.jpg', text: 'Clanke' },
      { id: 9, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779156472/moitruongxanh_yjlyk8.jpg', text: 'Môi trường xanh' },
      { id: 10, imgUrl: 'https://res.cloudinary.com/dnabfe0ki/image/upload/v1779240643/ythuc_ovtuiy.jpg', text: 'Ý thức' }
    ];
    // ----------------

    const CARD_SIZE = 120;
    const GAP_SIZE = 15;

    let lockBoard = false;
    let hasFlippedCard = false;
    let firstCard, secondCard;
    let totalMatchesFound = 0;

    // 1. Preload Both Pokemon Images AND the Target Image
    function preloadImages() {
      const loadingText = document.getElementById('loading-text');
      let imagesLoaded = 0;
      const totalImagesToLoad = gameData.length + 1; // Pokemon + Target Image

      const fallbackTimer = setTimeout(() => { startGame(); }, 3000);

      function imgLoaded() {
        imagesLoaded++;
        loadingText.innerText = `${imagesLoaded} / ${totalImagesToLoad} loaded`;
        if (imagesLoaded === totalImagesToLoad) {
          clearTimeout(fallbackTimer);
          setTimeout(startGame, 300);
        }
      }

      // Load Target Image
      const targetImg = new Image();
      targetImg.onload = imgLoaded;
      targetImg.onerror = imgLoaded;
      targetImg.src = TARGET_IMAGE;

      // Load Game Images
      gameData.forEach(data => {
        const img = new Image();
        img.onload = imgLoaded;
        img.onerror = imgLoaded;
        img.src = data.imgUrl;
      });
    }

    // 2. Start / Generate Game
    function startGame() {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('game-ui').classList.remove('hidden');
      
      const overlay = document.getElementById('final-overlay');
      overlay.classList.remove('visible');
      setTimeout(() => overlay.classList.add('hidden'), 1000);

      const board = document.getElementById('game-board');
      board.innerHTML = ''; 
      resetMatchVariables();
      totalMatchesFound = 0;

      // Create Deck Array (Image + Text pairs)
      let cardsArray = [];
      gameData.forEach(item => {
        cardsArray.push({ type: 'image', content: item.imgUrl, matchId: item.id });
        cardsArray.push({ type: 'text', content: item.text, matchId: item.id });
      });

      // Shuffle
      cardsArray.sort(() => 0.5 - Math.random());

      // Grid Math
      const totalCards = cardsArray.length;
      const idealCols = Math.round(Math.sqrt(totalCards * 1.5));
      const idealRows = Math.ceil(totalCards / idealCols);
      
      const totalGridWidth = (idealCols * CARD_SIZE) + ((idealCols - 1) * GAP_SIZE);
      const totalGridHeight = (idealRows * CARD_SIZE) + ((idealRows - 1) * GAP_SIZE);

      board.style.gridTemplateColumns = `repeat(${idealCols}, ${CARD_SIZE}px)`;
      board.style.width = `${totalGridWidth}px`;
      overlay.style.backgroundImage = `url('${TARGET_IMAGE}')`;

      // Build DOM
      for (let i = 0; i < totalCards; i++) {
        const cardData = cardsArray[i];

        // Masking Offset Math
        const colIndex = i % idealCols;
        const rowIndex = Math.floor(i / idealCols);
        const xOffset = colIndex * (CARD_SIZE + GAP_SIZE);
        const yOffset = rowIndex * (CARD_SIZE + GAP_SIZE);

        const slot = document.createElement('div');
        slot.classList.add('card-slot');
        
        const inner = document.createElement('div');
        inner.classList.add('card-inner');
        inner.dataset.matchId = cardData.matchId;

        const front = document.createElement('div');
        front.classList.add('card-front');

        const back = document.createElement('div');
        back.classList.add('card-back');

        // Layer 1: The hidden background fraction
        const imageLayer = document.createElement('div');
        imageLayer.classList.add('image-layer');
        imageLayer.style.backgroundImage = `url('${TARGET_IMAGE}')`;
        imageLayer.style.backgroundSize = `${totalGridWidth}px ${totalGridHeight}px`;
        imageLayer.style.backgroundPosition = `-${xOffset}px -${yOffset}px`;

        // Layer 2: The Pokemon / Text (Sits on top of imageLayer)
        const contentLayer = document.createElement('div');
        contentLayer.classList.add('content-layer');
        
        if (cardData.type === 'image') {
          contentLayer.innerHTML = `<img src="${cardData.content}" alt="game asset">`;
        } else {
          contentLayer.innerHTML = cardData.content;
        }

        back.appendChild(imageLayer);
        back.appendChild(contentLayer);
        
        inner.appendChild(front);
        inner.appendChild(back);
        slot.appendChild(inner);
        board.appendChild(slot);

        inner.addEventListener('click', flipCard);
      }
    }

    // 3. Match Logic
    function flipCard() {
      if (lockBoard) return; 
      if (this === firstCard) return; 

      this.classList.add('flipped');

      if (!hasFlippedCard) {
        hasFlippedCard = true;
        firstCard = this;
        return;
      }

      secondCard = this;
      checkForMatch();
    }

    function checkForMatch() {
      let isMatch = firstCard.dataset.matchId === secondCard.dataset.matchId;

      if (isMatch) {
        processMatch();
      } else {
        unflipCards(); 
      }
    }

    function processMatch() {
      firstCard.removeEventListener('click', flipCard);
      secondCard.removeEventListener('click', flipCard);
      
      const content1 = firstCard.querySelector('.content-layer');
      const content2 = secondCard.querySelector('.content-layer');

      // 1. Immediately turn them green to show success
      content1.classList.add('matched');
      content2.classList.add('matched');

      totalMatchesFound += 2; // We found 2 cards

      // 2. Wait for the delay, then fade the Pokemon/Text out to reveal background
      setTimeout(() => {
        content1.style.opacity = '0';
        content2.style.opacity = '0';
        
        checkWinCondition();
      }, GREEN_FADE_DELAY);

      resetMatchVariables();
    }

    function unflipCards() {
      lockBoard = true; 
      setTimeout(() => {
        firstCard.classList.remove('flipped');
        secondCard.classList.remove('flipped');
        resetMatchVariables();
      }, 1000);
    }

    function resetMatchVariables() {
      hasFlippedCard = false;
      lockBoard = false;
      firstCard = null;
      secondCard = null;
    }

    function checkWinCondition() {
      // If matches found equals total cards generated from the array
      if (totalMatchesFound === (gameData.length * 2)) {
        setTimeout(() => {
          const overlay = document.getElementById('final-overlay');
          overlay.classList.remove('hidden');
          setTimeout(() => overlay.classList.add('visible'), 50); 
        }, 500);
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', startGame);

    // Run Preloader
    preloadImages();
  </script>
</body>
</html>
